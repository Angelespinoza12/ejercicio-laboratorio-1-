<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Calculadora</title>

    <script>
        function sumar() {
            let num1, num2, res;
            num1 = parseFloat(document.calculadora.valor1.value);
            num2 = parseFloat(document.calculadora.valor2.value);
            res = num1 + num2;
            document.calculadora.resultado.value = res;
        }

        function restar() {
            let num1, num2, res;
            num1 = parseFloat(document.calculadora.valor1.value);
            num2 = parseFloat(document.calculadora.valor2.value);
            res = num1 - num2;
            document.calculadora.resultado.value = res;
        }

        function multiplicar() {
            let num1, num2, res;
            num1 = parseFloat(document.calculadora.valor1.value);
            num2 = parseFloat(document.calculadora.valor2.value);
            res = num1 * num2;
            document.calculadora.resultado.value = res;
        }

        function dividir() {
            let num1, num2, res;
            num1 = parseFloat(document.calculadora.valor1.value);
            num2 = parseFloat(document.calculadora.valor2.value);

            if (num2 == 0) {
                alert("No se puede dividir entre cero");
            } else {
                res = num1 / num2;
                document.calculadora.resultado.value = res;
            }
        }
    </script>
</head>

<body>
    <form name="calculadora">
        Primer número: <input type="text" name="valor1"><br><br>
        Segundo número: <input type="text" name="valor2"><br><br>

        <input type="button" value="Sumar" onclick="sumar()">
        <input type="button" value="Restar" onclick="restar()">
        <input type="button" value="Multiplicar" onclick="multiplicar()">
        <input type="button" value="Dividir" onclick="dividir()"><br><br>

        Resultado: <input type="text" name="resultado">
    </form>
</body>

</html>
