<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATM - Cajero Automático</title>
<!-- Bootstrap 5 CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
rel="stylesheet">
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<style>
body {
    
     background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.atm-card {
background: rgba(255,255,255,0.95);
border-radius: 20px;
padding: 30px;
box-shadow: 0 20px 60px rgba(0,0,0,0.3);
max-width: 500px;
width: 100%;
}
.btn-atm {
background: #4a5568;
color: white;
border: none;
padding: 12px;
font-size: 1.2rem;
transition: all 0.3s;
}
.btn-atm:hover {
background: #2d3748;
transform: scale(1.05);
}
.screen {
background: #e2e8f0;
border-radius: 10px;
padding: 20px;
min-height: 150px;
border: 2px solid #4a5568;
margin-bottom: 20px;
}
.hidden {
display: none;
}
</style>
</head>
<body>
<div class="container">
<div class="atm-card">
<h1 class="text-center mb-4" style="color: #4a5568;">🏧 Cajero Automático</h1>
<!-- Pantalla de login -->
<div id="login-screen" class="screen">
<h3 class="text-center">Iniciar sesión</h3>
<div class="mb-3">
<label for="tarjeta" class="form-label">Número de tarjeta</label>
<input type="text" class="form-control" id="tarjeta"
placeholder="1234567890123456" maxlength="16">
</div>
<div class="mb-3">
<label for="pin" class="form-label">PIN</label>
<input type="password" class="form-control" id="pin" placeholder="****"
maxlength="4">
</div>
<button id="btn-login" class="btn btn-atm w-100">Ingresar</button>
<div id="login-error" class="text-danger mt-2 text-center"></div>
</div>
<!-- Pantalla de operaciones -->
<div id="operations-screen" class="screen hidden">
<h3 class="text-center" id="bienvenida"></h3>
<div class="d-flex flex-column gap-2">
            <div id="operations-screen" class="screen hidden">
                <h3 class="text-center" id="bienvenida"></h3>
                <div class="d-flex flex-column gap-2">
                    <button id="btn-consultar" class="btn btn-atm">💰 Consultar saldo</button>
                    <button id="btn-retirar" class="btn btn-atm">💸 Retirar dinero</button>
                    <button id="btn-movimientos" class="btn btn-atm">📋 Últimos
                        movimientos</button>
                    <button id="btn-salir" class="btn btn-secondary">🔚 Salir</button>
                </div>
                <div id="resultado" class="mt-3 p-2 bg-white rounded"></div>
            </div>
            <!-- Pantalla de retiro -->
            <div id="retiro-screen" class="screen hidden">
                <h3 class="text-center">Retirar dinero</h3>
                <div class="mb-3">
                    <label for="monto" class="form-label">Monto a retirar ($)</label>
                    <input type="number" class="form-control" id="monto" min="1" step="0.01">
                </div>
                <div class="d-flex gap-2">
                    <button id="btn-confirmar-retiro" class="btn btn-atm
flex-grow-1">Confirmar</button>
                    <button id="btn-cancelar-retiro" class="btn btn-secondary
flex-grow-1">Cancelar</button>
                </div>
                <div id="retiro-error" class="text-danger mt-2"></div>
            </div>
        </div>
    </div>
    <script>
        $(document).ready(function () {
            // Variable para almacenar datos del usuario
            let usuarioActual = null;
            const API_URL = '/atm-app/api'; // Ajusta la ruta según tu configuración
            // Mostrar pantalla de login
            function mostrarLogin() {
                $('#login-screen').removeClass('hidden');
                $('#operations-screen').addClass('hidden');
                $('#retiro-screen').addClass('hidden');
                $('#tarjeta').val('');
                $('#pin').val('');
                $('#login-error').text('');
                usuarioActual = null;
            }
            function mostrarOperaciones() {
                $('#login-screen').addClass('hidden');
                $('#operations-screen').removeClass('hidden');
                $('#retiro-screen').addClass('hidden');
                $('#bienvenida').text(`Bienvenido, ${usuarioActual.nombre}`);
                $('#resultado').empty();
            }
            function mostrarRetiro() {
                $('#login-screen').addClass('hidden');
                $('#operations-screen').addClass('hidden');
                $('#retiro-screen').removeClass('hidden');
                $('#monto').val('');
                $('#retiro-error').text('');
            }
            // Login
            $('#btn-login').click(function () {
                const tarjeta = $('#tarjeta').val().trim();
                const pin = $('#pin').val().trim();
                if (!tarjeta || !pin) {
                    $('#login-error').text('Por favor ingrese tarjeta y PIN');
                    return;
                }
                $.ajax({
                    url: `${API_URL}/login.php`,
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ tarjeta, pin }),
                    dataType: 'json'
                })
                    .done(function (respuesta) {
                        if (respuesta.success) {
                            usuarioActual = respuesta.usuario;
                            mostrarOperaciones();
                        } else {
                            $('#login-error').text('Error inesperado');
                        }
                    })
                    .fail(function (xhr) {
                        let mensaje = 'Error de conexión';
                        if (xhr.responseJSON && xhr.responseJSON.error) {
                            mensaje = xhr.responseJSON.error;
                        }
                        $('#login-error').text(mensaje);
                    });
            });
            // Consultar saldo
            $('#btn-consultar').click(function () {
                if (!usuarioActual) return;
                $.get(`${API_URL}/balance.php`)
                    .done(function (data) {
                        $('#resultado').html(`<div class="alert alert-info">Saldo actual:
$${data.saldo.toFixed(2)}</div>`);
                    })
                    .fail(function () {
                        $('#resultado').html('<div class="alert alert-danger">Error al consultar
saldo</div > ');
});
            });
            // Ir a pantalla de retiro
            $('#btn-retirar').click(function () {
                mostrarRetiro();
            });
            // Confirmar retiro
            $('#btn-confirmar-retiro').click(function () {
                const monto = parseFloat($('#monto').val());
                if (isNaN(monto) || monto <= 0) {
                    $('#retiro-error').text('Ingrese un monto válido');
                    return;
                }
                $.ajax({
                    url: `${API_URL}/withdraw.php`,
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ monto }),
                    dataType: 'json'
                })
                    .done(function (respuesta) {
                        if (respuesta.success) {
                            usuarioActual.saldo = respuesta.nuevo_saldo;
                            $('#resultado').html(`<div class="alert alert-success">${respuesta.mensaje}.
Nuevo saldo: $${respuesta.nuevo_saldo.toFixed(2)}</div>`);
                            mostrarOperaciones();
                        } else {
                            $('#retiro-error').text('Error inesperado');
                        }
                    })
                    .fail(function (xhr) {
                        let mensaje = 'Error al procesar el retiro';
                        if (xhr.responseJSON && xhr.responseJSON.error) {
                            mensaje = xhr.responseJSON.error;
                        }
                        $('#retiro-error').text(mensaje);
                    });
            });
            // Cancelar retiro
            $('#btn-cancelar-retiro').click(function () {
                mostrarOperaciones();
            });
            // Ver últimos movimientos
            $('#btn-movimientos').click(function () {
                if (!usuarioActual) return;
                $.get(`${API_URL}/transactions.php`)
                    .done(function (movimientos) {
                        if (movimientos.length === 0) {
                            $('#resultado').html('<div class="alert alert-warning">No hay movimientos
          recientes</div > ');    
                           return;
                        }
                        let html = '<ul class="list-group">';
                        movimientos.forEach(m => {
                            const fecha = new Date(m.fecha).toLocaleString();
                            html += `<li class="list-group-item">${fecha} - ${m.tipo}:
$${parseFloat(m.monto).toFixed(2)}</li>`;
                        });
                        html += '</ul>';
                        $('#resultado').html(html);
                    })
                    .fail(function () {
                        $('#resultado').html('<div class="alert alert-danger">Error al obtener
movimientos
          </div > ');
});
            });
            // Salir
            $('#btn-salir').click(function () {
                $.post(`${API_URL}/logout.php`)
                    .always(function () {
                        mostrarLogin();
                    });
            });
            // Inicializar
            mostrarLogin();
        });
    </script>
</body>

</html>
