<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card p-4 shadow">
            <h3 class="text-center mb-4">Calculadora</h3>

            <form id="calculadora">

                <div class="mb-3">
                    <label>Primer número:</label>
                    <input type="number" id="valor1" class="form-control">
                </div>

                <div class="mb-3">
                    <label>Segundo número:</label>
                    <input type="number" id="valor2" class="form-control">
                </div>

                <div class="mb-3 text-center">
                    <button type="button" id="sumar" class="btn btn-primary">Sumar</button>
                    <button type="button" id="restar" class="btn btn-warning">Restar</button>
                    <button type="button" id="multiplicar" class="btn btn-success">Multiplicar</button>
                    <button type="button" id="dividir" class="btn btn-danger">Dividir</button>
                </div>

                <div class="mb-3">
                    <label>Resultado:</label>
                    <input type="text" id="resultado" class="form-control" readonly>
                </div>

            </form>
        </div>
    </div>

    <script>
        $(document).ready(function () {

            $("#sumar").click(function () {
                let num1 = parseFloat($("#valor1").val());
                let num2 = parseFloat($("#valor2").val());
                let res = num1 + num2;
                $("#resultado").val(res);
            });

            $("#restar").click(function () {
                let num1 = parseFloat($("#valor1").val());
                let num2 = parseFloat($("#valor2").val());
                let res = num1 - num2;
                $("#resultado").val(res);
            });

            $("#multiplicar").click(function () {
                let num1 = parseFloat($("#valor1").val());
                let num2 = parseFloat($("#valor2").val());
                let res = num1 * num2;
                $("#resultado").val(res);
            });

            $("#dividir").click(function () {
                let num1 = parseFloat($("#valor1").val());
                let num2 = parseFloat($("#valor2").val());

                if (num2 == 0) {
                    alert("No se puede dividir entre cero");
                } else {
                    let res = num1 / num2;
                    $("#resultado").val(res);
                }
            });

        });
    </script>

</body>

</html>
